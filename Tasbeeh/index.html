<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swipe Tasbeeh - Islamic Virasat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --gold: #f1c40f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f0; color: var(--dark); overflow: hidden; touch-action: none; }

        header { background: #fff; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        
        /* Dua Card Style */
        .dua-card-container {
            margin: 20px auto; width: 90%; max-width: 400px; height: 120px;
            perspective: 1000px;
        }
        .dua-card {
            background: white; padding: 15px; border-radius: 15px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-left: 5px solid var(--primary);
            transition: 0.5s transform;
        }
        .dua-card h2 { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; }
        .dua-card p { font-size: 0.85rem; font-weight: 600; color: #555; }

        /* Swipe Area (Reel Style) */
        .swipe-area {
            height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }
        
        #countDisplay { font-size: 6rem; font-weight: 700; color: var(--primary); opacity: 0.2; position: absolute; z-index: 1; }

        /* Animated Beads (Tasbeeh Dana) */
        .bead {
            width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60);
            border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: absolute; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2; border: 4px solid #fff;
        }

        .controls { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; background: var(--dark); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:600; color:var(--primary);">Islamic Virasat</div>
    <div style="font-size:1.2rem;">📿</div>
</header>

<div class="dua-card-container">
    <div class="dua-card" id="azkarCard">
        <h2 id="arabicDua">سُبْحَانَ ٱللَّٰهِ</h2>
        <p id="hindiDua">SubhanAllah (Allah Pak Hai)</p>
    </div>
</div>

<div class="swipe-area" id="swipeZone">
    <div id="countDisplay">00</div>
    <div class="bead" id="mainBead"></div>
    <p style="margin-top: 180px; color: #999; font-size: 0.8rem;">Slide Up to Count ↑</p>
</div>

<div class="controls">
    <button class="icon-btn" onclick="resetAll()" style="background:#e74c3c;">🔄</button>
    <div id="totalBadge" style="background:white; padding:10px 20px; border-radius:20px; font-weight:600; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">Total: <span id="totalCount">0</span></div>
</div>

<script>
    let count = 0;
    let totalCount = 0;
    let azkarIndex = 0;
    
    const azkarList = [
        { ar: "سُبْحَانَ ٱللَّٰهِ", hi: "SubhanAllah (Allah Pak Hai)" },
        { ar: "ٱلْحَمْدُ لِلَّٰهِ", hi: "Alhamdulillah (Sab Tarif Allah Ke Liye)" },
        { ar: "ٱللَّٰهُ أَكْبَرُ", hi: "Allahu Akbar (Allah Sabse Bada Hai)" }
    ];

    let startY = 0;
    const swipeZone = document.getElementById('swipeZone');
    const bead = document.getElementById('mainBead');

    swipeZone.addEventListener('touchstart', e => {
        startY = e.touches[0].clientY;
    }, {passive: true});

    swipeZone.addEventListener('touchend', e => {
        let endY = e.changedTouches[0].clientY;
        if (startY - endY > 50) { // Swipe Up detected
            handleCount();
        }
    }, {passive: true});

    function handleCount() {
        count++;
        totalCount++;
        
        // Vibration
        if (navigator.vibrate) navigator.vibrate(40);

        // Bead Animation (Jump effect)
        bead.style.transform = "translateY(-150px) scale(0.8)";
        bead.style.opacity = "0";

        setTimeout(() => {
            bead.style.transition = "none";
            bead.style.transform = "translateY(150px)";
            updateUI();
            setTimeout(() => {
                bead.style.transition = "0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                bead.style.transform = "translateY(0) scale(1)";
                bead.style.opacity = "1";
            }, 50);
        }, 200);

        // 33 Count Logic
        if (count >= 33) {
            count = 0;
            azkarIndex = (azkarIndex + 1) % azkarList.length;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            animateCard();
        }
    }

    function updateUI() {
        document.getElementById('countDisplay').innerText = count.toString().padStart(2, '0');
        document.getElementById('totalCount').innerText = totalCount;
    }

    function animateCard() {
        const card = document.getElementById('azkarCard');
        card.style.transform = "translateX(-100%)";
        card.style.opacity = "0";
        
        setTimeout(() => {
            document.getElementById('arabicDua').innerText = azkarList[azkarIndex].ar;
            document.getElementById('hindiDua').innerText = azkarList[azkarIndex].hi;
            card.style.transition = "none";
            card.style.transform = "translateX(100%)";
            setTimeout(() => {
                card.style.transition = "0.5s transform, 0.5s opacity";
                card.style.transform = "translateX(0)";
                card.style.opacity = "1";
            }, 50);
        }, 500);
    }

    function resetAll() {
        count = 0; totalCount = 0; azkarIndex = 0;
        document.getElementById('arabicDua').innerText = azkarList[0].ar;
        document.getElementById('hindiDua').innerText = azkarList[0].hi;
        updateUI();
    }
</script>
</body>
</html>
