<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dua & Timeline History</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --line: #27ae60; --bg: #ffffff; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        header { padding: 15px 20px; background: #fff; display: flex; justify-content: space-between; border-bottom: 2px solid #f0f0f0; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 600; color: var(--line); }

        .filter-container { display: flex; justify-content: center; gap: 10px; padding: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 5px 15px; border-radius: 20px; border: 1px solid var(--line); background: none; cursor: pointer; color: var(--line); font-size: 0.8rem; }
        .filter-btn.active { background: var(--line); color: #fff; }

        /* Timeline Layout */
        .timeline { position: relative; max-width: 800px; margin: 20px auto; padding-bottom: 100px; }
        .timeline::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50px; width: 2px; background: var(--line); }
        
        .event-row { display: flex; margin-bottom: 30px; opacity: 0; transform: translateY(20px); transition: 0.5s; cursor: pointer; align-items: center; }
        .event-row.show { opacity: 1; transform: translateY(0); }
        
        /* Homepage: Sirf Title dikhane ke liye changes */
        .date-col { width: 45px; text-align: center; color: var(--line); font-weight: 600; font-size: 0.7rem; }
        .content-col { flex: 1; padding-left: 25px; }
        .content-col h3 { font-size: 1rem; color: #2c3e50; font-weight: 400; }

        /* Lightbox Fixes */
        .card-overlay { display: none; position: fixed; z-index: 5000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .slider-container { width: 95%; max-width: 450px; position: relative; display: flex; align-items: center; }
        .active-card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.7rem; direction: rtl; margin: 15px 0; color: #222; line-height: 1.6; }

        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: none; font-size: 25px; cursor: pointer; padding: 10px; position: absolute; top: 50%; transform: translateY(-50%); border-radius: 50%; z-index: 5001; }
        .prev { left: -45px; } .next { right: -45px; }
        .close-overlay { position: absolute; top: 15px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 5002; }
        
        .audio-btn { background: var(--line); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: 600; }
        .btn-card-share { margin-top: 8px; width: 100%; padding: 10px; border-radius: 10px; border: none; background: #34495e; color: white; cursor: pointer; font-size: 0.9rem; }

        .bismillah-container { text-align: center; font-size: 1.8rem; color: var(--line); padding: 10px; font-family: 'Amiri', serif; }
        #colorPicker { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .color-circle { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #ddd; }

        @media (max-width: 600px) {
            .prev, .next { top: auto; bottom: -60px; transform: none; }
            .prev { left: 20%; } .next { right: 20%; }
        }
    </style>
</head>
<body>

<div id="cardLightbox" class="card-overlay">
    <span class="close-overlay" onclick="closeLightbox()">&times;</span>
    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        <div id="activeCardContent" class="active-card"></div>
        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>
</div>

<header>
    <div class="logo">Dua Timeline App</div>
    <div onclick="alert('Menu Coming Soon')" style="font-size: 1.5rem; cursor: pointer;">☰</div>
</header>

<div class="bismillah-container">﷽</div>

<div class="filter-container">
    <button class="filter-btn active" onclick="filterDua('All', this)">All</button>
    <button class="filter-btn" onclick="filterDua('Hajj', this)">Hajj</button>
    <button class="filter-btn" onclick="filterDua('Travel', this)">Travel</button>
    <button class="filter-btn" onclick="filterDua('Daily', this)">Daily</button>
</div>

<div class="timeline" id="mainTimeline"></div>

<div id="watermarkBox" style="display:none; text-align:center; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
    <p style="font-size:0.7rem; color:#27ae60; font-weight:600;">Dua Timeline Prophet</p>
    <p style="font-size:0.5rem; color:#999;">Shared via Dua App</p>
</div>

<script>
    const eventFiles = ['Dua1.html', 'Dua2.html']; 
    let allEventsData = [];
    let currentSlideIndex = 0;
    const themes = [
        { bg: "#ffffff", text: "#2c3e50" }, { bg: "#f9f1e7", text: "#5d4037" },
        { bg: "#e8f5e9", text: "#1b5e20" }, { bg: "#2c3e50", text: "#ffffff" }
    ];

    async function loadEvents() {
        const container = document.getElementById('mainTimeline');
        for (let i = 0; i < eventFiles.length; i++) {
            try {
                const response = await fetch(eventFiles[i]);
                const html = await response.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');

                const data = {
                    no: doc.querySelector('.dua-no')?.innerText || (i+1),
                    title: doc.querySelector('h1')?.innerText || 'Dua',
                    arabic: doc.querySelector('.arabic')?.innerText || '',
                    hindi: doc.querySelector('.hindi')?.innerText || '',
                    urdu: doc.querySelector('.urdu')?.innerText || '',
                    category: doc.querySelector('.category')?.innerText || 'Daily',
                };
                allEventsData.push(data);

                const row = document.createElement('div');
                row.className = 'event-row';
                row.setAttribute('data-category', data.category);
                row.onclick = () => openLightbox(i);
                
                // Homepage Fix: Sirf Title show hoga
                row.innerHTML = `
                    <div class="date-col">${data.no}</div>
                    <div class="content-col">
                        <h3>${data.title}</h3>
                    </div>
                `;
                container.appendChild(row);
                setTimeout(() => row.classList.add('show'), i * 100);
            } catch (e) { console.error(e); }
        }
    }

    function openLightbox(index) {
        currentSlideIndex = index;
        document.getElementById('cardLightbox').style.display = 'flex';
        updateLightboxContent();
    }

    function updateLightboxContent() {
        const data = allEventsData[currentSlideIndex];
        const container = document.getElementById('activeCardContent');
        
        // Lightbox Fix: Sab kuch show hoga (Arabic, Hindi, Urdu)
        container.innerHTML = `
            <div id="captureArea">
                <span style="color:var(--line); font-size:0.8rem; font-weight:600;">Dua #${data.no}</span>
                <h2 style="margin:5px 0; font-size:1.3rem;">${data.title}</h2>
                <div class="arabic-text">${data.arabic}</div>
                <p style="margin-bottom:8px; font-size:0.9rem;"><b>Hindi:</b> ${data.hindi}</p>
                <p style="font-size:0.9rem;"><b>Urdu:</b> ${data.urdu}</p>
            </div>
            
            <div id="ui-elements">
                <div id="colorPicker"></div>
                <button class="audio-btn" onclick="playTTS()">🔊 Listen Dua</button>
                <button class="btn-card-share" onclick="shareAsImage()">📸 Share Image</button>
                <button class="btn-card-share" style="background:#27ae60;" onclick="shareAsText()">✍️ Share Text (WhatsApp)</button>
            </div>
        `;
        setupColorPicker();
        container.scrollTop = 0; 
    }

    // Text Share Fix: Arabic added, Date removed
    function shareAsText() {
        const data = allEventsData[currentSlideIndex];
        const siteUrl = window.location.origin;

        const shareMessage = `✨ *Dua Number:* ${data.no}\n\n` +
                             `🕌 *${data.title}*\n\n` +
                             `${data.arabic}\n\n` +
                             `📖 *Hindi:* ${data.hindi}\n` +
                             `✍️ *Urdu:* ${data.urdu}\n\n` +
                             `🌐 *Read more:* ${siteUrl}`;

        if (navigator.share) {
            navigator.share({ title: data.title, text: shareMessage });
        } else {
            navigator.clipboard.writeText(shareMessage);
            alert("Copied to Clipboard!");
        }
    }

    async function shareAsImage() {
        const ui = document.getElementById('ui-elements');
        const watermark = document.getElementById('watermarkBox');
        const captureArea = document.getElementById('activeCardContent');
        ui.style.display = 'none';
        const wmClone = watermark.cloneNode(true);
        wmClone.style.display = 'block';
        captureArea.appendChild(wmClone);

        const canvas = await html2canvas(captureArea, { scale: 2 });
        canvas.toBlob(blob => {
            const file = new File([blob], 'dua.png', { type: 'image/png' });
            if (navigator.share) navigator.share({ files: [file], title: 'Dua' });
        });
        ui.style.display = 'block';
        captureArea.removeChild(wmClone);
    }

    function playTTS() {
        window.speechSynthesis.cancel();
        const data = allEventsData[currentSlideIndex];
        const msg = new SpeechSynthesisUtterance(data.hindi);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
    }

    function setupColorPicker() {
        const picker = document.getElementById('colorPicker');
        themes.forEach(t => {
            const div = document.createElement('div');
            div.className = 'color-circle';
            div.style.background = t.bg;
            div.onclick = () => {
                const card = document.getElementById('activeCardContent');
                card.style.background = t.bg;
                card.style.color = t.text;
                card.querySelectorAll('h2, p, div, span').forEach(el => el.style.color = t.text);
            };
            picker.appendChild(div);
        });
    }

    // Swipe Logic
    let touchstartX = 0;
    let touchendX = 0;
    const slider = document.getElementById('cardLightbox');
    slider.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
    slider.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        if (touchendX < touchstartX - 50) changeSlide(1);
        if (touchendX > touchstartX + 50) changeSlide(-1);
    }, {passive: true});

    function filterDua(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.event-row').forEach(row => {
            row.style.display = (cat === 'All' || row.getAttribute('data-category') === cat) ? 'flex' : 'none';
        });
    }

    function changeSlide(n) {
        currentSlideIndex = (currentSlideIndex + n + allEventsData.length) % allEventsData.length;
        updateLightboxContent();
    }

    function closeLightbox() {
        document.getElementById('cardLightbox').style.display = 'none';
        window.speechSynthesis.cancel();
    }

    window.onload = loadEvents;
</script>
</body>
</html>
