<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dua & Timeline History</title>
    <meta name="description" content="Masnoon Duas Collection">
    <meta property="og:title" content="Dua Timeline">
    <meta property="og:description" content="Learn and share beautiful duas.">
      <style>
        :root { --line: #27ae60; --bg: #ffffff; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        header { padding: 15px 20px; background: #fff; display: flex; justify-content: space-between; border-bottom: 2px solid #f0f0f0; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 600; color: var(--line); }

        .filter-container { display: flex; justify-content: center; gap: 10px; padding: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 5px 15px; border-radius: 20px; border: 1px solid var(--line); background: none; cursor: pointer; color: var(--line); font-size: 0.8rem; }
        .filter-btn.active { background: var(--line); color: #fff; }

        /* Timeline Layout */
        .timeline { position: relative; max-width: 800px; margin: 20px auto; padding-bottom: 100px; }
        .timeline::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50px; width: 2px; background: var(--line); }
        
        .event-row { display: flex; margin-bottom: 30px; opacity: 0; transform: translateY(20px); transition: 0.5s; cursor: pointer; align-items: center; }
        .event-row.show { opacity: 1; transform: translateY(0); }
        
        /* Homepage: Sirf Title dikhane ke liye changes */
        .date-col { width: 45px; text-align: center; color: var(--line); font-weight: 600; font-size: 0.7rem; }
        .content-col { flex: 1; padding-left: 25px; }
        .content-col h3 { font-size: 1rem; color: #2c3e50; font-weight: 400; }

        /* Lightbox Fixes */
        .card-overlay { display: none; position: fixed; z-index: 5000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .slider-container { width: 95%; max-width: 450px; position: relative; display: flex; align-items: center; }
        .active-card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.7rem; direction: rtl; margin: 15px 0; color: #222; line-height: 1.6; }

        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: none; font-size: 25px; cursor: pointer; padding: 10px; position: absolute; top: 50%; transform: translateY(-50%); border-radius: 50%; z-index: 5001; }
        .prev { left: -45px; } .next { right: -45px; }
        .close-overlay { position: absolute; top: 15px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 5002; }
        
        .audio-btn { background: var(--line); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: 600; }
        .btn-card-share { margin-top: 8px; width: 100%; padding: 10px; border-radius: 10px; border: none; background: #34495e; color: white; cursor: pointer; font-size: 0.9rem; }

        .bismillah-container { text-align: center; font-size: 1.8rem; color: var(--line); padding: 10px; font-family: 'Amiri', serif; }
        #colorPicker { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .color-circle { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #ddd; }

        @media (max-width: 600px) {
            .prev, .next { top: auto; bottom: -60px; transform: none; }
            .prev { left: 20%; } .next { right: 20%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Dua Timeline App</div>
    <div onclick="alert('Menu Coming Soon')" style="font-size: 1.5rem; cursor: pointer;">☰</div>
</header>
<div class="filter-container">
    <button class="filter-btn active" onclick="filterDua('All', this)">All</button>
    <button class="filter-btn" onclick="filterDua('Quranic Rabbana Dua', this)">Quranic Rabbana Dua</button>
    <button class="filter-btn" onclick="filterDua('Travel', this)">Travel</button>
    <button class="filter-btn" onclick="filterDua('Daily', this)">Daily</button>
</div>

<div class="timeline" id="mainTimeline">
    <div class="event-row show">
        <div class="date-col">01</div>
        <div class="content-col"><h3>Duayein load ho rahi hain...</h3></div>
    </div>
</div>

<div id="cardLightbox" class="card-overlay">
    <span class="close-overlay" onclick="closeLightbox()">&times;</span>
    <div class="slider-container">
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        <div id="activeCardContent" class="active-card"></div>
        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>
</div>
<div id="hiddenCapture" style="position:fixed; left:-9999px; top:0; width:450px; background:white; padding:20px;"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzI0oK1KNxMdOvyMmg0yJyUIdJdC1facKuTQCIHf5Hm3WF-eu54IdAeJgoWenF9JNeiXg/exec"; 
let allEventsData = [];
let currentSlideIndex = 0;

async function loadEvents() {
    const container = document.getElementById('mainTimeline');
    try {
        const response = await fetch(API_URL);
        allEventsData = await response.json();
        container.innerHTML = ""; 

        allEventsData.forEach((data, i) => {
            const row = document.createElement('div');
            row.className = 'event-row show';
row.setAttribute('data-category', data.cat); 
            row.onclick = () => openLightbox(i);
            row.innerHTML = `<div class="date-col">${i + 1}</div><div class="content-col"><h3>${data.title}</h3></div>`;
            container.appendChild(row);
        });
    } catch (e) {
        container.innerHTML = "Data load karne mein error aaya.";
    }
}

// --- Naya Filter aur Share Code ---

// 1. Filter Logic
function filterDua(cat, btn) {
    // Buttons active class update
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const rows = document.querySelectorAll('.event-row');
    rows.forEach(row => {
        const rowCat = row.getAttribute('data-category');
        if (cat === 'All' || rowCat === cat) {
            row.style.display = 'flex';
        } else {
            row.style.display = 'none';
        }
    });
}

// 2. Share Text Logic
function shareAsText() {
    const data = allEventsData[currentSlideIndex];
    const text = `*${data.title}*\n\nعربی: ${data.arabic}\nहिन्दी: ${data.hindi}\n\nपढ़ने के लिए यहाँ क्लिक करें: ${window.location.href}`;
    
    if (navigator.share) {
        navigator.share({ title: data.title, text: text });
    } else {
        alert("Share feature aapke browser mein support nahi kar raha.");
    }
}
    async function shareAsImage() {
    const btn = event.target;
    const data = allEventsData[currentSlideIndex];
    const hiddenDiv = document.getElementById('hiddenCapture');
    
    btn.innerText = "Generating...";
    
    // Hidden div mein wahi content daalo jo card mein hai
    hiddenDiv.innerHTML = `
        <h2 style="text-align:center;">${data.title}</h2>
        <div style="font-family: 'Amiri'; text-align:right; font-size: 2rem;">${data.arabic}</div>
        <p style="text-align:center;">${data.hindi || ""}</p>
        <div id="watermarkBox" style="text-align:center; margin-top:20px;">Dua Timeline App</div>
    `;

    const canvas = await html2canvas(hiddenDiv, { scale: 2 });
    canvas.toBlob(blob => {
        const file = new File([blob], 'dua.png', { type: 'image/png' });
        if (navigator.share) navigator.share({ files: [file] });
        btn.innerText = "📸 Share Image";
    });
}

    function updateLightboxContent() {
    const data = allEventsData[currentSlideIndex];
    const container = document.getElementById('activeCardContent');
    
    // Sirf wahi line banayein jiska data available hai
    let contentHtml = `<div id="captureArea">
        <span style="color:var(--line); font-size:0.8rem; font-weight:600;">Dua #${currentSlideIndex + 1}</span>
        <h2 style="margin:5px 0; font-size:1.3rem;">${data.title}</h2>
        <div class="arabic-text">${data.arabic}</div>`;

    if (data.hindi && data.hindi.trim() !== "") contentHtml += `<p style="margin-bottom:8px;"><b>Hindi:</b> ${data.hindi}</p>`;
    if (data.urdu && data.urdu.trim() !== "") contentHtml += `<p style="margin-bottom:8px;"><b>Urdu:</b> ${data.urdu}</p>`;
    if (data.english && data.english.trim() !== "") contentHtml += `<p style="margin-bottom:8px;"><b>English:</b> ${data.english}</p>`;
    if (data.tamil && data.tamil.trim() !== "") contentHtml += `<p style="margin-bottom:8px;"><b>Tamil:</b> ${data.tamil}</p>`;
    
    contentHtml += `</div>`;

    // Audio Buttons
    let audioHtml = "";
    if (data.audioAr && data.audioAr.length > 5) audioHtml += `<button class="audio-btn" style="background:#2ecc71;" onclick="playAudio('${data.audioAr}')">🔊 Arabic Recitation</button>`;
    if (data.audioTr && data.audioTr.length > 5) audioHtml += `<button class="audio-btn" style="background:#3498db;" onclick="playAudio('${data.audioTr}')">🔊 Tarjuma</button>`;

    container.innerHTML = contentHtml + `
        <div id="ui-elements">
            ${audioHtml}
            <button class="btn-card-share" onclick="shareAsImage()">📸 Share Image</button>
            <button class="btn-card-share" style="background:#27ae60;" onclick="shareAsText()">✍️ Share Text</button>
        </div>
    `;
    setupColorPicker();
    container.scrollTop = 0;
}
function changeSlide(n) {
    currentSlideIndex = (currentSlideIndex + n + allEventsData.length) % allEventsData.length;
    updateLightboxContent();
}

// Swipe Detector (Ise script mein kahin bhi dal dein)
const slider = document.getElementById('cardLightbox');
let touchstartX = 0;
slider.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
slider.addEventListener('touchend', e => {
    let diff = e.changedTouches[0].screenX - touchstartX;
    if (diff > 50) changeSlide(-1); // Right Swipe
    else if (diff < -50) changeSlide(1); // Left Swipe
}, {passive: true});

function openLightbox(index) {
    currentSlideIndex = index;
    const data = allEventsData[index];
    document.title = data.title;
    document.getElementById('activeCardContent').innerHTML = ""; // Clear
    document.getElementById('cardLightbox').style.display = 'flex';
    updateLightboxContent();
    // URL Update
    const newUrl = `${window.location.pathname}?id=${index}`;
    window.history.pushState({path: newUrl}, '', newUrl);
}

function closeLightbox() { document.getElementById('cardLightbox').style.display = 'none'; }
function playAudio(url) { new Audio(url).play(); }

window.onload = async () => {
    await loadEvents();
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id !== null && allEventsData[id]) openLightbox(parseInt(id));
};
</script>
</body>
