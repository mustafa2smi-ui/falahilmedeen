<form id="duaForm">
    <input type="text" name="title" placeholder="Title" required><br>
    <input type="text" name="arabic" placeholder="Arabic"><br>
    <input type="text" name="hindi" placeholder="Hindi"><br>
    <input type="text" name="urdu" placeholder="Urdu"><br>
    <input type="text" name="english" placeholder="English"><br>
    <input type="text" name="tamil" placeholder="Tamil"><br>
    <input type="text" name="audioAr" placeholder="Arabic Audio Link (Drive)"><br>
    <input type="text" name="audioTr" placeholder="Tarjuma Audio Link (Drive)"><br>
    <input type="text" name="cat" placeholder="Category (Daily/Hajj/Travel)"><br>
    <button type="button" onclick="sendData()">Save Dua</button>
</form>

<script>
function sendData() {
    const form = document.getElementById("duaForm");
    const formData = new URLSearchParams(new FormData(form));

    fetch("https://script.google.com/macros/s/AKfycbzI0oK1KNxMdOvyMmg0yJyUIdJdC1facKuTQCIHf5Hm3WF-eu54IdAeJgoWenF9JNeiXg/exec", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => alert("Dua Save Ho Gayi!"))
    .catch(err => alert("Error: " + err));
}
</script>
